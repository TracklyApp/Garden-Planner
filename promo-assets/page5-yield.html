<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="shared.css">
<style>
  .wrap { padding: 90px 100px 0; }
  .title { font-size: 70px; max-width: 1500px; }
  .shot-wrap { margin: 50px auto 0; width: 1650px; }
  .badge-row { margin-top: 44px; }
</style></head>
<body>
  <div class="wrap">
    <div class="eyebrow">📈 Yield Summary</div>
    <h1 class="title serif">Know Your <span class="accent">Real Cost &amp; Profit</span> — Crop by Crop</h1>
    <p class="subtitle">Seed cost, fertilizer, expenses and sales — pulled automatically from every other tab into one clear breakdown.</p>
    <div class="badge-row">
      <div class="badge">💵 Cost per kg, per crop</div>
      <div class="badge">🧺 Actual revenue from sales</div>
      <div class="badge">📊 Monthly harvest chart</div>
    </div>
    <div class="shot-wrap browser-frame">
      <div class="browser-bar">
        <div class="dot" style="background:#ff5f57"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c840"></div>
      </div>
      <img src="raw/yield.png">
    </div>
  </div>
</body></html>
