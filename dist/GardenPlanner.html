<style>
  :root {
    --bg: #f3f6ef;
    --panel: #ffffff;
    --border: #e0e6d8;
    --text: #24301f;
    --muted: #74806c;
    --accent: #4c7a3f;
    --accent-rgb: 76,122,63;
    --accent-soft: #e7f0e0;
    --accent2: #a7c65a;
    --danger: #c65a4c;
    --warn: #c98a2c;
    --hover: rgba(76,122,63,.08);
    --shadow: 0 1px 3px rgba(30,40,20,.08), 0 4px 16px rgba(30,40,20,.05);
  }
  body.dark {
    --bg: #10140d;
    --panel: #171d13;
    --border: #2a331f;
    --text: #eaf1e2;
    --muted: #93a186;
    --accent: #8fc36a;
    --accent-soft: #223018;
    --accent2: #c8e654;
    --danger: #ff8b7b;
    --warn: #e0a94a;
    --hover: rgba(255,255,255,.06);
    --shadow: none;
  }
  * { box-sizing: border-box; }
  html { background: var(--bg); height: 100%; overflow-x: hidden; }
  body {
    margin: 0; min-height: 100%; max-width: 100vw;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 12px 22px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 19px; margin: 0; letter-spacing: -.3px; display:flex; align-items:center; gap:8px; min-width: 0; overflow: hidden; }
  header h1 .h1-icon { flex-shrink: 0; }
  header h1 .h1-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  header h1 .h1-text > span { color: var(--accent); }
  .header-meta { display: flex; flex-direction: column; justify-content: center; min-width: 0; flex: 1 1 auto; overflow: hidden; }
  .header-datetime { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  .top-actions { margin-left: auto; display: flex; gap: 8px; align-items:center; flex-shrink: 0; }
  #menuBtn { flex-shrink: 0; }
  .btn {
    border: none; background: var(--accent); color: #fff; padding: 9px 16px;
    border-radius: 8px; font-size: 13.5px; font-weight: 600; cursor: pointer; white-space:nowrap;
  }
  .btn:hover { filter: brightness(1.06); }
  .btn.secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .btn.small { padding: 6px 11px; font-size: 12.5px; }
  #menuBtn { display: none; }
  .layout { display: flex; min-height: calc(100vh - 58px); }
  .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(10,12,8,.5); z-index: 59; }
  .sidebar-backdrop.show { display: block; }
  nav { width: 250px; padding: 16px 10px; border-right: 1px solid var(--border); background: var(--panel); overflow-y:auto; }
  .nav-group-head {
    padding: 12px 10px 6px; font-size: 11px; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase; color: var(--muted); user-select: none;
  }
  .nav-group-head:hover { color: var(--text); }
  .nav-group-head .chev { font-size: 9px; width: 10px; display: inline-block; }
  .nav-item {
    display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px;
    cursor: pointer; font-size: 13.5px; color: var(--muted); margin-bottom: 1px; user-select: none;
  }
  .nav-item:hover { background: var(--hover); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 700; }

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240">

      <stop offset="0%" stop-color="${bg1}"/><stop offset="100%" stop-color="${bg2}"/>

    <rect width="240" height="240" rx="18" fill="url(#g)"/>

    </foreignObject>
  </svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);

const FREE_CHANGE_LIMIT = 3;
const ACTIVATION_CODE = 'GTX7-9K4Q-M2WR'; // sellers: replace with your own code and tell buyers in the listing/receipt

function getChangeCount() { return parseInt(localStorage.getItem('gp_changeCount') || '0', 10); }
function isActivated() { return localStorage.getItem('gp_activated') === 'true'; }

function guardChange() {
  if (isActivated()) return true;
  const count = getChangeCount();
  if (count >= FREE_CHANGE_LIMIT) { showActivationModal(); return false; }
  localStorage.setItem('gp_changeCount', String(count + 1));
  refreshActivationStatus();
  return true;
}

function showActivationModal() {
  showModal(`
    <h3>🔒 Activate Full Version</h3>
    <p style="color:var(--muted);font-size:14px">You've used your ${FREE_CHANGE_LIMIT} free changes in this preview. Enter your activation code (from your purchase) to unlock unlimited editing.</p>
    <div class="field"><label>Activation Code</label><input id="activationInput" placeholder="Enter code"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">Maybe later</button>
      <button class="btn" onclick="tryActivate()">Activate</button>
    </div>
  `);
}
function tryActivate() {
  const code = document.getElementById('activationInput').value.trim();
  if (code && code.toUpperCase() === ACTIVATION_CODE.toUpperCase()) {
    localStorage.setItem('gp_activated', 'true');
    closeModal();
    refreshActivationStatus();
    alert('Activated! You now have unlimited editing.');
  } else {
    alert('Invalid code. Please check your purchase confirmation.');
  }
}
function refreshActivationStatus() {
  const el = document.getElementById('activationStatus');
  if (!el) return;
  if (isActivated()) {
    el.innerHTML = '';
  } else {
    const left = Math.max(0, FREE_CHANGE_LIMIT - getChangeCount());
    el.innerHTML = `🔒 Preview mode — ${left} free change${left === 1 ? '' : 's'} left. <a href="#" onclick="showActivationModal();return false;" style="color:var(--accent)">Activate</a>`;
  }
}

function syncScheduleTasks() {
  if (!data.todo) data.todo = [];
  const existingKeys = new Set(data.todo.filter(t => t.autoKey).map(t => t.autoKey));
  const validKeys = new Set();
  (data.schedule || []).forEach(s => {
    const jobs = [
      { type: 'sow', date: s.sowDate, verb: 'Sow' },
      { type: 'transplant', date: s.transplantDate, verb: 'Transplant' },
      { type: 'harvest', date: s.harvestEstDate, verb: 'Harvest' },
    ];
    jobs.forEach(j => {
      if (!j.date) return;
      const key = `${s.id}_${j.type}`;
      validKeys.add(key);
      if (!existingKeys.has(key)) {
        data.todo.push({ id: uid(), task: `${j.verb} ${s.crop}`, due: j.date, priority: 'Medium', done: false, autoKey: key });
      }
    });
  });
  data.todo = data.todo.filter(t => !t.autoKey || validKeys.has(t.autoKey));
}

function computeCropBreakdown() {
  const rows = {};
  const ensure = (name) => rows[name] || (rows[name] = { yield: 0, seedCost: 0, fertCost: 0, expenseCost: 0, revenue: 0 });
  (data.harvest || []).forEach(h => { if (h.crop) ensure(h.crop).yield += parseFloat(h.qty) || 0; });
  (data.seeds || []).forEach(s => { if (s.plant) ensure(s.plant).seedCost += parseFloat(s.cost) || 0; });
  (data.fertilizer || []).forEach(f => { ensure(f.crop || 'General').fertCost += parseFloat(f.cost) || 0; });
  (data.expenses || []).forEach(e => { ensure(e.crop || 'General').expenseCost += parseFloat(e.cost) || 0; });
  (data.valorization || []).forEach(v => { if (v.use === 'Sold' && v.crop) ensure(v.crop).revenue += parseFloat(v.value) || 0; });
  return rows;
}

function getKnownCrops() {
  const names = new Set();
  (data.seeds || []).forEach(i => i.plant && names.add(i.plant));
  (data.schedule || []).forEach(i => i.crop && names.add(i.crop));
  (data.harvest || []).forEach(i => i.crop && names.add(i.crop));
  (data.growth || []).forEach(i => i.plant && names.add(i.plant));
  (data.seedStarting || []).forEach(i => i.plant && names.add(i.plant));
  (data.valorization || []).forEach(i => i.crop && names.add(i.crop));
  return Array.from(names).sort((a,b) => a.localeCompare(b));
}

/* ---------------- Nav / routing ---------------- */
let currentSection = 'dashboard';

const COLLAPSIBLE_GROUPS = ['Garden Log', 'Bonus Pages'];
let collapsedGroups = JSON.parse(localStorage.getItem('gp_collapsedGroups') || '[]');

function buildNav() {
  const groups = {};
  SECTIONS.forEach(s => { (groups[s.group] = groups[s.group] || []).push(s); });
  let html = '';
  Object.keys(groups).forEach(g => {
    const collapsible = COLLAPSIBLE_GROUPS.includes(g);
    const collapsed = collapsible && collapsedGroups.includes(g);
    if (collapsible) {
      html += `<div class="nav-group-head" onclick="toggleGroup('${g}')" style="cursor:pointer;display:flex;align-items:center;gap:6px">
        <span class="chev">${collapsed ? '▸' : '▾'}</span><span>${g}</span>
      </div>`;
    } else {
      html += `<div class="nav-group-head">${g}</div>`;
    }
    html += `<div class="nav-group-items" style="${collapsed ? 'display:none' : ''}">`;
    groups[g].forEach(s => {
      const count = s.fields ? (data[s.id] ? data[s.id].length : 0) : '';
      html += `<div class="nav-item ${s.id === currentSection ? 'active' : ''}" onclick="goTo('${s.id}')">
        <span>${s.icon}</span><span>${s.title}</span>
        ${count !== '' ? `<span class="count">${count}</span>` : ''}
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('navList').innerHTML = html;
}

function toggleGroup(g) {
  if (collapsedGroups.includes(g)) collapsedGroups = collapsedGroups.filter(x => x !== g);
  else collapsedGroups.push(g);
  localStorage.setItem('gp_collapsedGroups', JSON.stringify(collapsedGroups));
  buildNav();
}

function goTo(id) {
  currentSection = id;
  buildNav();
  render();
  if (window.innerWidth <= 780) toggleNav(true);
}

function toggleNav(forceClose) {
  const nav = document.getElementById('sideNav');
  const bd = document.getElementById('backdrop');
  if (forceClose) { nav.classList.remove('open'); bd.classList.remove('show'); return; }
  nav.classList.toggle('open');
  bd.classList.toggle('show');
}

function onSearchInput() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const box = document.getElementById('searchResults');
  if (!q) { box.classList.remove('show'); box.innerHTML = ''; return; }
  const results = [];
  SECTIONS.filter(s => s.fields).forEach(sec => {
    (data[sec.id] || []).forEach(item => {
      const hay = sec.fields.map(f => item[f.key]).filter(v => typeof v === 'string').join(' ').toLowerCase();
      if (hay.includes(q)) {
        const titleField = sec.fields.find(f => f.required) || sec.fields[0];
        results.push({ sec, item, title: item[titleField.key] || '(untitled)' });
      }
    });
  });
  if (!results.length) {
    box.innerHTML = `<div class="search-empty">No matches found.</div>`;
  } else {
    box.innerHTML = results.slice(0, 30).map(r => `
      <div class="search-result" onclick="goToSearchResult('${r.sec.id}','${r.item.id}')">
        <div class="sr-sec">${r.sec.icon} ${r.sec.title}</div>
        <div class="sr-title">${esc(r.title)}</div>
      </div>
    `).join('');
  }
  box.classList.add('show');
}

/* ---------------- This Week digest ---------------- */
function computeThisWeek() {
  const today = new Date(); today.setHours(0,0,0,0);
  const horizon = new Date(today); horizon.setDate(horizon.getDate() + 7);
  const lookback = new Date(today); lookback.setDate(lookback.getDate() - 14);
  const items = [];
  (data.todo || []).forEach(t => {
    if (t.done || !t.due) return;
    const d = new Date(t.due); if (isNaN(d)) return;
    items.push({ icon: '✅', label: t.task, date: d, sectionId: 'todo', itemId: t.id });
  });
  (data.schedule || []).forEach(s => {
    [['sowDate', 'Sow'], ['transplantDate', 'Transplant'], ['harvestEstDate', 'Harvest (est.)']].forEach(([key, verb]) => {
      if (!s[key]) return;
      const d = new Date(s[key]); if (isNaN(d)) return;
      items.push({ icon: '📅', label: `${verb} ${s.crop}`, date: d, sectionId: 'schedule', itemId: s.id });
    });
  });
  return items
    .filter(i => i.date <= horizon && i.date >= lookback)
    .sort((a, b) => a.date - b.date)
    .slice(0, 12)
    .map(i => {
      const diffDays = Math.round((i.date - today) / 86400000);
      return { ...i, overdue: diffDays < 0, today: diffDays === 0, diffDays };
    });
}
function renderThisWeekRows() {
  const items = computeThisWeek();
  if (!items.length) return `<p style="color:var(--muted);font-size:13px">Nothing overdue or due in the next 7 days.</p>`;
  return `<div>${items.map(i => `
    <div class="week-row ${i.overdue ? 'overdue' : ''} ${i.today ? 'today' : ''}" onclick="goToWeekItem('${i.sectionId}','${i.itemId}')">
      <span>${i.icon}</span>

    </div>
  `).join('')}</div>`;
}

}

  `;
}
function cropEmoji(crop) {
  const c = (crop || '').toLowerCase();
  const map = [
    [['tomato'], '🍅'], [['carrot'], '🥕'], [['lettuce','spinach','greens','salad'], '🥬'],
    [['basil','herb','mint','parsley'], '🌿'], [['pepper','chili'], '🌶️'], [['bean'], '🫘'],
    [['onion','garlic'], '🧅'], [['cabbage'], '🥬'], [['squash','zucchini','pumpkin'], '🎃'],
    [['cucumber'], '🥒'], [['strawberr'], '🍓'], [['potato'], '🥔'], [['corn'], '🌽'], [['flower','marigold'], '🌼'],
  ];
  for (const [keys, emoji] of map) if (keys.some(k => c.includes(k))) return emoji;
  return '🌱';
}
function bedTileSize(b) {
  let w = parseFloat(b.widthM), l = parseFloat(b.lengthM);
  if (!w || !l) {
    const m = (b.size || '').match(/([\d.]+)\s*m?\s*x\s*([\d.]+)/i);
    if (m) { w = parseFloat(m[1]); l = parseFloat(m[2]); }
  }
  if (!w || !l) return 'width:150px;height:110px;';
  const scale = 55;
  const px = v => Math.max(90, Math.min(340, Math.round(v * scale)));
  return `width:${px(w)}px;height:${px(l)}px;`;
}
function bedTileDims(b) {
  const style = bedTileSize(b);
  const w = parseInt((style.match(/width:(\d+)px/) || [])[1]) || 150;
  const h = parseInt((style.match(/height:(\d+)px/) || [])[1]) || 110;
  return { w, h };
}
function bedPlantGrid(b) {
  const { w, h } = bedTileDims(b);
  const cell = 34;
  const cols = Math.max(2, Math.min(8, Math.round(w / cell)));
  const rows = Math.max(2, Math.min(8, Math.round(h / cell)));
  const emoji = cropEmoji(b.crop);
  let cells = '';
  for (let i = 0; i < rows * cols; i++) cells += `<span>${emoji}</span>`;
  return `<div class="bt-grid" style="grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr)">${cells}</div>`;
}
function computeBedWarnings(beds) {
  const chart = data.companion || [];
  const warnings = {};
  const includesName = (text, name) => !!text && !!name && text.toLowerCase().includes(name.toLowerCase());
  const flag = (bedId, msg) => (warnings[bedId] = warnings[bedId] || []).push(msg);
  for (let i = 0; i < beds.length - 1; i++) {
    const a = beds[i], b = beds[i + 1];
    if (!a.crop || !b.crop) continue;
    chart.forEach(c => {
      if (!c.plant || !c.bad) return;
      const badNames = c.bad.split(',').map(s => s.trim()).filter(Boolean);
      if (includesName(a.crop, c.plant)) {
        badNames.forEach(bad => { if (includesName(b.crop, bad)) {
          flag(a.id, `${c.plant} should avoid ${bad} — planted in ${b.name || 'the next bed'}`);
          flag(b.id, `${bad} should avoid ${c.plant} — planted in ${a.name || 'the previous bed'}`);
        }});
      }
      if (includesName(b.crop, c.plant)) {
        badNames.forEach(bad => { if (includesName(a.crop, bad)) {
          flag(b.id, `${c.plant} should avoid ${bad} — planted in ${a.name || 'the previous bed'}`);
          flag(a.id, `${bad} should avoid ${c.plant} — planted in ${b.name || 'the next bed'}`);
        }});
      }
    });
  }
  return warnings;
}

function renderCell(f, val, sec, item) {
  if (val === undefined || val === null || val === '') return '';
  if (f.type === 'image') return `<img class="thumb" src="${val}">`;
  if (f.type === 'checkbox') return val ? '✅' : '—';
  let out = esc(String(val));
  if (sec && sec.id === 'schedule' && f.key === 'sowDate') {
    const frostMD = latestLastFrostMonthDay();
    const sowDate = new Date(val);
    if (frostMD && !isNaN(sowDate)) {
      const sowMD = sowDate.getMonth() * 100 + sowDate.getDate();
      if (sowMD < frostMD) {
        out += ` <span style="color:var(--warn);font-weight:600;font-size:12.5px;white-space:nowrap" title="Earlier than the last recorded frost date (any year)">⚠️ Before frost</span>`;
      }
    }
  }
  return out;
}
function latestLastFrostMonthDay() {
  const mds = (data.frost || []).map(f => f.lastFrost).filter(Boolean).map(d => new Date(d)).filter(d => !isNaN(d))
    .map(d => d.getMonth() * 100 + d.getDate());
  if (!mds.length) return null;
  return Math.max(...mds);
}

      else opts = f.options.slice();

        reader.readAsDataURL(file);
      };
    }
  });

function saveItem(sectionId, id) {

/* ---------------- Yield summary ---------------- */
function renderYield() {
  const main = document.getElementById('main');
  const totalYield = (data.harvest || []).reduce((a,h) => a + (parseFloat(h.qty) || 0), 0);
  const expenseCost = (data.expenses || []).reduce((a,e) => a + (parseFloat(e.cost) || 0), 0);
  const seedCost = (data.seeds || []).reduce((a,s) => a + (parseFloat(s.cost) || 0), 0);
  const fertilizerCost = (data.fertilizer || []).reduce((a,f) => a + (parseFloat(f.cost) || 0), 0);
  const totalCost = expenseCost + seedCost + fertilizerCost;
  const costPerKg = totalYield > 0 ? (totalCost / totalYield) : 0;

  const valorization = data.valorization || [];
  const actualRevenue = valorization.filter(v => v.use === 'Sold').reduce((a,v) => a + (parseFloat(v.value) || 0), 0);
  const actualProfit = actualRevenue - totalCost;
  const useBreakdown = {};
  valorization.forEach(v => { useBreakdown[v.use || 'Unspecified'] = (useBreakdown[v.use || 'Unspecified'] || 0) + (parseFloat(v.qty) || 0); });
  const valorizedQty = Object.values(useBreakdown).reduce((a,b) => a+b, 0);
  const unaccountedQty = Math.max(0, totalYield - valorizedQty);

  const salePrice = parseFloat(localStorage.getItem('gp_salePrice') || '0') || 0;
  const projectedRevenue = salePrice * totalYield;
  const projectedProfit = projectedRevenue - totalCost;

  const cropRows = computeCropBreakdown();
  const cropNames = Object.keys(cropRows).filter(n => n !== 'General').sort((a,b) => a.localeCompare(b));
  if (cropRows['General']) cropNames.push('General');
  const cropTotals = cropNames.reduce((t,n) => {
    const r = cropRows[n];
    const cost = r.seedCost + r.fertCost + r.expenseCost;
    t.yield += r.yield; t.cost += cost; t.revenue += r.revenue;
    return t;
  }, { yield: 0, cost: 0, revenue: 0 });

  const byMonth = MONTHS.map(() => 0);
  (data.harvest || []).forEach(h => {
    if (!h.date) return;
    const m = new Date(h.date).getMonth();
    if (isNaN(m)) return;
    byMonth[m] += (parseFloat(h.qty) || 0);
  });
  const maxVal = Math.max(...byMonth, 1);
  main.innerHTML = `

      <div class="stat-card"><div class="num">${totalYield.toFixed(1)} kg</div><div class="lbl">Total Yield</div></div>
      <div class="stat-card"><div class="num">${totalCost.toFixed(2)}</div><div class="lbl">Total Cost</div></div>
      <div class="stat-card"><div class="num">${costPerKg.toFixed(2)}</div><div class="lbl">Cost / kg</div></div>
      <div class="stat-card"><div class="num">${actualRevenue.toFixed(2)}</div><div class="lbl">Actual Revenue (Sold)</div></div>
      <div class="stat-card"><div class="num">${actualProfit.toFixed(2)}</div><div class="lbl">Actual Profit</div></div>
    </div>
    <div class="card">
      <h3 style="margin-top:0">Cost Breakdown</h3>
      <p style="color:var(--muted);font-size:13px;margin-top:0">Automatically pulled from Seed Inventory, Fertilizer Log, and Garden Expenses.</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Source</th><th>Cost</th></tr></thead>
          <tbody>
            <tr><td>🌾 Seed Inventory</td><td>${seedCost.toFixed(2)}</td></tr>
            <tr><td>🌿 Fertilizer Log</td><td>${fertilizerCost.toFixed(2)}</td></tr>
            <tr><td>💰 Garden Expenses</td><td>${expenseCost.toFixed(2)}</td></tr>
            <tr><td><strong>Total</strong></td><td><strong>${totalCost.toFixed(2)}</strong></td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-top:0">Breakdown by Crop</h3>
      <p style="color:var(--muted);font-size:13px;margin-top:0">Each crop, then the total. Fertilizer/expense entries without a crop selected fall under "General".</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Crop</th><th>Yield (kg)</th><th>Seed Cost</th><th>Fert. Cost</th><th>Other Exp.</th><th>Total Cost</th><th>Cost/kg</th><th>Revenue (Sold)</th><th>Profit</th></tr></thead>
          <tbody>
            ${cropNames.length ? cropNames.map(n => {
              const r = cropRows[n];
              const cost = r.seedCost + r.fertCost + r.expenseCost;
              const perKg = r.yield > 0 ? cost / r.yield : 0;
              const profit = r.revenue - cost;
              return `<tr>
                <td>${n === 'General' ? '— General —' : esc(n)}</td>
                <td>${r.yield ? r.yield.toFixed(1) : ''}</td>

            ${cropNames.length ? `<tr>
              <td><strong>Total</strong></td>
              <td><strong>${cropTotals.yield.toFixed(1)}</strong></td>

          ${MONTHS.map((m,i) => `
            <div class="bar-col">
              <div class="bar-val">${byMonth[i] ? byMonth[i].toFixed(1) : ''}</div>

      ${Object.keys(useBreakdown).length ? `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Use</th><th>Quantity (kg)</th></tr></thead>
            <tbody>
              ${Object.entries(useBreakdown).map(([use, qty]) => `<tr><td>${esc(use)}</td><td>${qty.toFixed(1)}</td></tr>`).join('')}

    </div>
    <div class="card">
      <h3 style="margin-top:0">Projected Sale Price (per kg)</h3>
      <p style="color:var(--muted);font-size:13px;margin-top:0">Enter a hypothetical market price to estimate revenue and profit if you sold the <em>entire</em> harvest at that price. Projected profit: <strong>${projectedProfit.toFixed(2)}</strong></p>

    <div class="page-head"><div><h2>📆 Monthly Garden Planner</h2><p>Plan your tasks for each month of the year.</p></div></div>
    <div class="month-grid">
      ${MONTHS.map(m => `
        <div class="card month-card">
          <h4>${m}</h4>
          <textarea id="m_${m}" onblur="saveMonth('${m}')">${esc(data.monthly[m] || '')}</textarea>
        </div>
      `).join('')}
    </div>
  `;
}
function saveMonth(m) {
  if (!guardChange()) { render(); return; }
  data.monthly[m] = document.getElementById(`m_${m}`).value; save();
}

/* ---------------- Harvest calendar (computed) ---------------- */
function renderHarvestCal() {
  const main = document.getElementById('main');
  const byMonth = {};
  (data.harvest || []).forEach(h => {
    if (!h.date) return;
    const m = new Date(h.date).getMonth();
    if (isNaN(m)) return;
    (byMonth[m] = byMonth[m] || []).push(h);
  });
  main.innerHTML = `
    <div class="page-head"><div><h2>🗓️ Harvest Calendar</h2><p>Monthly view automatically generated from Harvest Tracker.</p></div></div>
    <div class="month-grid">
      ${MONTHS.map((m,i) => `
        <div class="card">
          <h4 style="margin:0 0 8px;color:var(--accent);font-size:14px">${m}</h4>
          ${(byMonth[i]||[]).length ? byMonth[i].map(h => `<div style="font-size:13px;margin-bottom:6px">🍅 <b>${esc(h.crop)}</b> — ${h.qty||'?'} kg <span style="color:var(--muted)">(${h.date})</span></div>`).join('') : `<div style="color:var(--muted);font-size:12.5px">No harvest recorded.</div>`}
        </div>
      `).join('')}
    </div>
  `;
}

/* ---------------- Photo gallery ---------------- */
function renderGallery() {
  const main = document.getElementById('main');
  const items = [];
  if (data.layout.sketch) items.push({ photo: data.layout.sketch, label: 'Garden Sketch', date: null, sectionId: 'layout', itemId: null });
  (data.layout.beds || []).forEach(b => {
    if (b.photo) items.push({ photo: b.photo, label: b.crop ? `${b.name} — ${b.crop}` : b.name, date: null, sectionId: 'layout', itemId: b.id, isBed: true });
  });
  (data.growth || []).forEach(g => {
    if (g.photo) items.push({ photo: g.photo, label: g.height ? `${g.plant} (${g.height})` : g.plant, date: g.date || null, sectionId: 'growth', itemId: g.id });
  });
  const dated = items.filter(i => i.date).sort((a, b) => new Date(a.date) - new Date(b.date));
  const undated = items.filter(i => !i.date);
  const sorted = [...dated, ...undated];
  main.innerHTML = `
    <div class="page-head"><div><h2>📷 Photo Gallery</h2><p>Every photo from Garden Layout and Plant Growth Tracker, gathered into one visual journal of the season.</p></div></div>
    ${sorted.length ? `
      <div class="gallery-grid">
        ${sorted.map(i => `
          <div class="gallery-card" ${i.itemId ? `onclick="goToGalleryItem('${i.sectionId}','${i.itemId}',${!!i.isBed})"` : ''}>
            <img src="${i.photo}">
            <div class="gc-label">${esc(i.label)}</div>
            ${i.date ? `<div class="gc-date">${i.date}</div>` : ''}
          </div>
        `).join('')}
      </div>
    ` : `<p style="color:var(--muted);font-size:13px">No photos yet — upload some in Garden Layout or Plant Growth Tracker.</p>`}
  `;
}
function goToGalleryItem(sectionId, itemId, isBed) {
  goTo(sectionId);
  if (isBed === true) setTimeout(() => openBedModal(itemId), 50);
  else setTimeout(() => openItemModal(sectionId, itemId), 50);
}

/* ---------------- Modal helpers ---------------- */
function showModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}
function closeModal() { document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', (e) => { if (e.target.id === 'overlay') closeModal(); });

/* ---------------- Export / Import ---------------- */
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `garden-planner-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      data = Object.assign(defaultData(), parsed);
      save(); buildNav(); render();
      alert('Import successful.');
    } catch (err) { alert('Invalid file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ---------------- Dark mode ---------------- */
function toggleDark() {
  data.dark = !data.dark;
  applyDark(); save();
}
function applyDark() {
  document.body.classList.toggle('dark', !!data.dark);
  document.getElementById('darkBtn').textContent = data.dark ? '☀️' : '🌙';
}

/* ---------------- Util ---------------- */
function esc(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function updateHeaderDate() {
  const now = new Date();
  document.getElementById('headerDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

/* ---------------- Init ---------------- */
const qs = new URLSearchParams(location.search);
if (qs.get('dark') === '1') data.dark = true;
applyDark();
updateHeaderDate();
syncScheduleTasks();
save();
const deepLinkSection = qs.get('section');
if (deepLinkSection && SECTIONS.some(s => s.id === deepLinkSection)) currentSection = deepLinkSection;
buildNav();
render();
refreshActivationStatus();
</script>

  const ov = document.getElementById('manualOverlay');
  if(!manualLoaded){
    const bytes = Uint8Array.from(atob(MANUAL_HTML_B64), c => c.charCodeAt(0));
    document.getElementById('manualFrame').srcdoc = new TextDecoder('utf-8').decode(bytes);
    manualLoaded = true;
  }
  ov.classList.add('show');
}
function closeManualOverlay(){
  document.getElementById('manualOverlay').classList.remove('show');
}
</script>
